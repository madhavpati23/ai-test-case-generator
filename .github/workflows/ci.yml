name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Unit tests
        run: pytest -q

      - name: Generate a suite and enforce the coverage standard
        run: |
          python -m test_case_generator generate \
            --feature "password reset email" --out-dir /tmp/generated --strict
          test -f /tmp/generated/safety.yaml

      - name: Coverage gate on the example suite
        run: python -m test_case_generator coverage --prompts examples/generated --strict
