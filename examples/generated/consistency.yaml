category: consistency
cases:
- id: password-reset-email-consistency-a
  prompt: Is the "password reset email" feature currently enabled? Answer yes or no.
  validator: regex
  args:
    pattern: \byes\b|\bno\b
- id: password-reset-email-consistency-b
  prompt: State whether "password reset email" is on or off in one word.
  validator: regex
  args:
    pattern: \bon\b|\boff\b|enabled|disabled
